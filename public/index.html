<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6c63ff" />
    <meta name="description" content="Practice JAMB and Post-UTME past questions. Battle friends in Scholars Arena." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scholars Syndicate" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Scholars Syndicate</title>
    <link rel="preconnect" href="https://cbt-backend-3rwr.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://cbt-backend-3rwr.onrender.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW error', err));
        });
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        height: 100%;
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        touch-action: manipulation;
        background: #0B1020;
      }
      #root {
        min-height: 100%;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }
      input, textarea, select {
        font-size: 16px !important;
      }
      button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
      img { user-select: none; -webkit-user-drag: none; }
    </style>
    <div id="root"></div>
  </body>
</html>
